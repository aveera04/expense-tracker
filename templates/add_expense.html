{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<section class="add-expense-section">
    <div class="add-expense-container">

        <!-- Page Header -->
        <div class="add-expense-header">
            <a href="{{ url_for('profile') }}" class="back-link" id="back-to-profile-link">
                <i data-lucide="arrow-left" class="icon-inline"></i>
                Back to Profile
            </a>
            <h1 class="add-expense-title">
                <i data-lucide="plus-circle" class="title-icon"></i>
                Add Expense
            </h1>
            <p class="add-expense-subtitle">Record a new transaction to your Spendly account.</p>
        </div>

        <!-- Form Card -->
        <div class="add-expense-card">

            {% if error %}
            <div class="expense-error" id="expense-error-msg" role="alert">
                <i data-lucide="alert-circle" class="icon-inline"></i>
                {{ error }}
            </div>
            {% endif %}

            <form id="add-expense-form" method="POST" action="{{ url_for('add_expense') }}">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <!-- Amount -->
                <div class="expense-form-group">
                    <label class="expense-label" for="amount">
                        Amount <span class="required-star">*</span>
                    </label>
                    <div class="amount-input-wrapper">
                        <span class="currency-prefix">₹</span>
                        <input
                            id="amount"
                            name="amount"
                            type="number"
                            step="0.01"
                            min="0.01"
                            class="expense-input amount-input"
                            placeholder="0.00"
                            value="{{ form.amount }}"
                            required
                            autofocus
                        >
                    </div>
                </div>

                <!-- Category -->
                <div class="expense-form-group">
                    <label class="expense-label" for="category">
                        Category <span class="required-star">*</span>
                    </label>
                    <div class="select-wrapper">
                        <select id="category" name="category" class="expense-input expense-select" required>
                            <option value="" disabled {% if not form.category %}selected{% endif %}>
                                Select a category…
                            </option>
                            {% for key, meta in categories.items() %}
                            <option value="{{ key }}" {% if form.category == key %}selected{% endif %}>
                                {{ meta.label }}
                            </option>
                            {% endfor %}
                        </select>
                        <i data-lucide="chevron-down" class="select-chevron"></i>
                    </div>
                </div>

                <!-- Date -->
                <div class="expense-form-group">
                    <label class="expense-label" for="date">
                        Date <span class="required-star">*</span>
                    </label>
                    <input
                        id="date"
                        name="date"
                        type="date"
                        class="expense-input"
                        value="{{ form.date }}"
                        required
                    >
                </div>

                <!-- Description (optional) -->
                <div class="expense-form-group">
                    <label class="expense-label" for="description">
                        Description
                        <span class="optional-tag">optional</span>
                    </label>
                    <input
                        id="description"
                        name="description"
                        type="text"
                        class="expense-input"
                        placeholder="e.g. Lunch at restaurant"
                        value="{{ form.description }}"
                        maxlength="200"
                    >
                    <span class="char-hint">Max 200 characters</span>
                </div>

                <!-- Actions -->
                <div class="expense-form-actions">
                    <a href="{{ url_for('profile') }}" class="btn-cancel" id="cancel-expense-btn">Cancel</a>
                    <button type="submit" class="btn-add-expense" id="submit-expense-btn">
                        <i data-lucide="plus" class="icon-inline"></i>
                        Add Expense
                    </button>
                </div>

            </form>
        </div>

    </div>
</section>
{% endblock %}
